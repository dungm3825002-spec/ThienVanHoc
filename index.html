<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Mặt Trời - Mô Phỏng Quỹ Đạo Hành Tinh</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #05080f;
            color: #e0e6f0;
            overflow-x: hidden;
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        /* Stars background */
        .stars-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        /* Canvas */
        #solarCanvas {
            display: block;
            cursor: grab;
            background: radial-gradient(ellipse at center, #0a0e1a 0%, #050810 60%, #020408 100%);
        }
        #solarCanvas:active { cursor: grabbing; }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(100,140,255,0.3); border-radius: 3px; }

        /* Glow effects */
        .glow-text { text-shadow: 0 0 20px rgba(100,160,255,0.5), 0 0 40px rgba(100,160,255,0.2); }
        .glow-box { box-shadow: 0 0 30px rgba(100,160,255,0.1), inset 0 1px 0 rgba(255,255,255,0.05); }

        /* Planet info card */
        .planet-card {
            background: linear-gradient(135deg, rgba(15,20,40,0.95), rgba(10,15,30,0.98));
            border: 1px solid rgba(100,140,255,0.15);
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }
        .planet-card:hover {
            border-color: rgba(100,160,255,0.4);
            box-shadow: 0 0 30px rgba(100,160,255,0.1);
        }
        .planet-card.active {
            border-color: rgba(100,180,255,0.6);
            box-shadow: 0 0 40px rgba(100,160,255,0.2);
        }

        /* Info panel */
        .info-panel {
            background: linear-gradient(180deg, rgba(8,12,25,0.98), rgba(5,8,18,0.99));
            border-left: 1px solid rgba(100,140,255,0.1);
        }

        /* Control bar */
        .control-bar {
            background: linear-gradient(180deg, rgba(8,12,25,0.95), rgba(5,8,18,0.98));
            border-top: 1px solid rgba(100,140,255,0.1);
        }

        /* Slider styling */
        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            height: 4px; background: rgba(100,140,255,0.2); border-radius: 2px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 16px; height: 16px; border-radius: 50%;
            background: linear-gradient(135deg, #60a0ff, #4080ff);
            cursor: pointer; box-shadow: 0 0 10px rgba(100,160,255,0.5);
        }

        /* Button styles */
        .btn-control {
            background: rgba(100,140,255,0.1);
            border: 1px solid rgba(100,140,255,0.2);
            color: #a0b8e0;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-control:hover {
            background: rgba(100,140,255,0.2);
            border-color: rgba(100,140,255,0.4);
            color: #c0d4ff;
        }
        .btn-control.active {
            background: rgba(100,140,255,0.25);
            border-color: rgba(100,160,255,0.5);
            color: #ffffff;
        }

        /* Tooltip */
        .tooltip-planet {
            position: absolute;
            background: rgba(10,15,30,0.95);
            border: 1px solid rgba(100,140,255,0.3);
            border-radius: 8px;
            padding: 8px 14px;
            pointer-events: none;
            z-index: 100;
            font-size: 13px;
            backdrop-filter: blur(10px);
            transition: opacity 0.15s;
        }

        /* Stat value */
        .stat-label { color: #6a7fa0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { color: #e0eaff; font-size: 14px; font-weight: 600; }

        /* Animate pulse */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }

        /* Planet list item */
        .planet-list-item {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .planet-list-item:hover {
            background: rgba(100,140,255,0.08);
            border-color: rgba(100,140,255,0.15);
        }
        .planet-list-item.selected {
            background: rgba(100,140,255,0.12);
            border-color: rgba(100,140,255,0.3);
        }

        /* Loading animation */
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin-slow { animation: spin-slow 20s linear infinite; }

        .data-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(100,140,255,0.06);
        }
        .data-row:last-child { border-bottom: none; }
    </style>
</head>
<body class="min-h-screen">

            <!-- Center - Canvas -->

                <!-- Zoom controls overlay -->

                    <button class="btn-control w-9 h-9 rounded-lg flex items-center justify-center text-lg" onclick="zoomOut()">−</button>

                    <!-- Info rendered by JS -->

        </div>

                </button>

                    ⏭

            </div>

            <div class="flex-1 flex items-center gap-4">

    };

    // ==================== CANVAS SETUP ====================
    const canvas = document.getElementById('solarCanvas');
    const ctx = canvas.getContext('2d');
    const starsCanvas = document.getElementById('starsCanvas');
    const starsCtx = starsCanvas.getContext('2d');

    let stars = [];
    function generateStars() {
        stars = [];
        for (let i = 0; i < 400; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                r: Math.random() * 1.5 + 0.3,
                brightness: Math.random() * 0.5 + 0.3,
                twinkleSpeed: Math.random() * 0.02 + 0.005,
                twinklePhase: Math.random() * Math.PI * 2,
            });
        }
    }

    function drawStars(time) {
        starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
        stars.forEach(s => {
            const b = s.brightness + Math.sin(time * s.twinkleSpeed + s.twinklePhase) * 0.2;
            starsCtx.beginPath();
            starsCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            starsCtx.fillStyle = `rgba(180,200,255,${Math.max(0.1, b)})`;
            starsCtx.fill();
        });
    }

    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        starsCanvas.width = window.innerWidth;
        starsCanvas.height = window.innerHeight;
        generateStars();
    }

    window.addEventListener('resize', resizeCanvas);

    // ==================== ORBITAL MECHANICS ====================
    function getPlanetPosition(planet, time) {
        const T = planet.orbitalPeriod;
        const e = planet.eccentricity;
        const a = planet.orbitRadiusAU; // semi-major axis in AU

        // Mean anomaly
        const M = (2 * Math.PI * time / T) % (2 * Math.PI);

        // Solve Kepler's equation: E - e*sin(E) = M (Newton's method)
        let E = M;
        for (let i = 0; i < 10; i++) {
            E = E - (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
        }

        // True anomaly
        const cosV = (Math.cos(E) - e) / (1 - e * Math.cos(E));
        const sinV = (Math.sqrt(1 - e * e) * Math.sin(E)) / (1 - e * Math.cos(E));
        const v = Math.atan2(sinV, cosV);

        // Distance from focus
        const r = a * (1 - e * Math.cos(E));

        return { x: r * Math.cos(v), y: r * Math.sin(v), r, angle: v };
    }

    function auToPixels(au) {
        const baseScale = state.viewMode === 'realistic' ? 80 : 55;
        // Use sqrt scaling for outer planets in realistic mode
        if (state.viewMode === 'realistic' && au > 2) {
            return (Math.sqrt(au) * baseScale * 0.65 + au * baseScale * 0.15) * state.zoom;
        }
        return au * baseScale * state.zoom;
    }

    function getCanvasCenter() {
        return {
            x: canvas.width / 2 + state.panX,
            y: canvas.height / 2 + state.panY
        };
    }

    // ==================== DRAWING ====================
    function drawSun(cx, cy) {
        const sunRadius = Math.max(8, 22 * state.zoom);

        // Outer glow
        const glow3 = ctx.createRadialGradient(cx, cy, sunRadius * 0.5, cx, cy, sunRadius * 6);
        glow3.addColorStop(0, 'rgba(255,200,50,0.08)');
        glow3.addColorStop(0.5, 'rgba(255,150,30,0.03)');
        glow3.addColorStop(1, 'rgba(255,100,20,0)');
        ctx.fillStyle = glow3;
        ctx.beginPath();
        ctx.arc(cx, cy, sunRadius * 6, 0, Math.PI * 2);
        ctx.fill();

        // Mid glow
        const glow2 = ctx.createRadialGradient(cx, cy, sunRadius * 0.3, cx, cy, sunRadius * 3);
        glow2.addColorStop(0, 'rgba(255,220,80,0.2)');
        glow2.addColorStop(0.5, 'rgba(255,180,40,0.1)');
        glow2.addColorStop(1, 'rgba(255,120,20,0)');
        ctx.fillStyle = glow2;
        ctx.beginPath();
        ctx.arc(cx, cy, sunRadius * 3, 0, Math.PI * 2);
        ctx.fill();

        // Inner glow
        const glow1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, sunRadius * 1.5);
        glow1.addColorStop(0, 'rgba(255,255,240,0.6)');
        glow1.addColorStop(0.3, 'rgba(255,230,100,0.4)');
        glow1.addColorStop(0.7, 'rgba(255,180,30,0.15)');
        glow1.addColorStop(1, 'rgba(255,120,10,0)');
        ctx.fillStyle = glow1;
        ctx.beginPath();
        ctx.arc(cx, cy, sunRadius * 1.5, 0, Math.PI * 2);
        ctx.fill();

        // Sun body
        const sunGrad = ctx.createRadialGradient(cx - sunRadius * 0.2, cy - sunRadius * 0.2, 0, cx, cy, sunRadius);
        sunGrad.addColorStop(0, '#fffff0');
        sunGrad.addColorStop(0.3, '#ffee80');
        sunGrad.addColorStop(0.7, '#ffcc00');
        sunGrad.addColorStop(1, '#ff9900');
        ctx.fillStyle = sunGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, sunRadius, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawOrbit(cx, cy, planet) {
        const a = planet.orbitRadiusAU;
        const e = planet.eccentricity;
        const b = a * Math.sqrt(1 - e * e);

        ctx.beginPath();
        const steps = 200;
        for (let i = 0; i <= steps; i++) {
            const angle = (i / steps) * Math.PI * 2;
            const r = a * (1 - e * e) / (1 + e * Math.cos(angle));
            const px = auToPixels(r * Math.cos(angle));
            const py = auToPixels(r * Math.sin(angle));
            if (i === 0) ctx.moveTo(cx + px, cy + py);
            else ctx.lineTo(cx + px, cy + py);
        }
        ctx.closePath();

        const isSelected = state.selectedPlanet === planet.id;
        const isHovered = state.hoveredPlanet === planet.id;

        if (isSelected) {
            ctx.strokeStyle = planet.color + '60';
            ctx.lineWidth = 1.5;
        } else if (isHovered) {
            ctx.strokeStyle = planet.color + '40';
            ctx.lineWidth = 1.2;
        } else {
            ctx.strokeStyle = 'rgba(100,140,255,0.08)';
            ctx.lineWidth = 0.8;
        }
        ctx.stroke();

        if (isSelected) {
            ctx.strokeStyle = planet.color + '15';
            ctx.lineWidth = 4;
            ctx.stroke();
        }
    }

    function drawPlanet(cx, cy, planet, pos) {
        const px = cx + auToPixels(pos.x);
        const py = cy + auToPixels(pos.y);
        const r = Math.max(2, planet.radius * Math.min(state.zoom * 0.5 + 0.5, 2));

        // Planet glow
        const isSelected = state.selectedPlanet === planet.id;
        const isHovered = state.hoveredPlanet === planet.id;

        if (isSelected || isHovered) {
            ctx.beginPath();
            ctx.arc(px, py, r * 3, 0, Math.PI * 2);
            ctx.fillStyle = planet.color + '15';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(px, py, r * 1.8, 0, Math.PI * 2);
            ctx.fillStyle = planet.color + '20';
            ctx.fill();
        }

        // Saturn rings
        if (planet.hasRings) {
            ctx.save();
            ctx.beginPath();
            ctx.ellipse(px, py, r * 2.2, r * 0.5, -0.3, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(210,190,140,0.4)';
            ctx.lineWidth = r * 0.4;
            ctx.stroke();
            ctx.strokeStyle = 'rgba(180,160,120,0.2)';
            ctx.lineWidth = r * 0.2;
            ctx.stroke();
            ctx.restore();
        }

        // Planet body
        const grad = ctx.createRadialGradient(px - r * 0.3, py - r * 0.3, 0, px, py, r);
        grad.addColorStop(0, planet.colorGradient[0]);
        grad.addColorStop(1, planet.colorGradient[1]);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fill();

        // Highlight
        ctx.beginPath();
        ctx.arc(px - r * 0.25, py - r * 0.25, r * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fill();

        // Selection ring
        if (isSelected) {
            ctx.beginPath();
            ctx.arc(px, py, r + 4, 0, Math.PI * 2);
            ctx.strokeStyle = planet.color + '80';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([3, 3]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Label
        if (state.showLabels) {
            ctx.font = `${isSelected ? '600' : '400'} ${isSelected ? 12 : 10}px Inter, sans-serif`;
            ctx.fillStyle = isSelected ? planet.color : 'rgba(180,200,230,0.5)';
            ctx.textAlign = 'center';
            ctx.fillText(planet.name, px, py - r - 8);
        }

        // Store screen position for hit detection
        planet._screenX = px;
        planet._screenY = py;
        planet._screenR = r;
    }

    function drawTrails(cx, cy) {
        PLANETS.forEach(planet => {
            const trail = state.trails[planet.id];
            if (!trail || trail.length < 2) return;

            ctx.beginPath();
            for (let i = 0; i < trail.length; i++) {
                const px = cx + auToPixels(trail[i].x);
                const py = cy + auToPixels(trail[i].y);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            const alpha = 0.4;
            ctx.strokeStyle = planet.color + Math.round(alpha * 255).toString(16).padStart(2, '0');
            ctx.lineWidth = 1;
            ctx.stroke();
        });
    }

    // ==================== MAIN RENDER LOOP ====================
    function render(timestamp) {
        // FPS calculation
        state.frameCount++;
        if (timestamp - state.fpsUpdateTime > 1000) {
            state.fps = state.frameCount;
            state.frameCount = 0;
            state.fpsUpdateTime = timestamp;
            document.getElementById('fpsCounter').textContent = state.fps + ' FPS';
        }

        const dt = state.paused ? 0 : (1 / 60) * state.speed;
        state.time += dt;

        // Update date display
        const totalDays = Math.floor(state.time);
        document.getElementById('timeDisplay').textContent = `Ngày ${totalDays.toLocaleString()}`;
        const baseDate = new Date(2024, 0, 1);
        const currentDate = new Date(baseDate.getTime() + totalDays * 86400000);
        document.getElementById('currentDateDisplay').textContent =
            currentDate.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });

        // Draw stars
        drawStars(timestamp * 0.001);

        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const center = getCanvasCenter();

        // Draw orbits
        if (state.showOrbits) {
            PLANETS.forEach(planet => drawOrbit(center.x, center.y, planet));
        }

        // Draw trails
        if (state.showTrails) {
            // Record trail positions
            PLANETS.forEach(planet => {
                const pos = getPlanetPosition(planet, state.time);
                if (!state.trails[planet.id]) state.trails[planet.id] = [];
                state.trails[planet.id].push({ x: pos.x, y: pos.y });
                if (state.trails[planet.id].length > 300) state.trails[planet.id].shift();
            });
            drawTrails(center.x, center.y);
        }

        // Draw sun
        drawSun(center.x, center.y);

        // Draw planets
        PLANETS.forEach(planet => {
            const pos = getPlanetPosition(planet, state.time);
            drawPlanet(center.x, center.y, planet, pos);
        });

        // Scale indicator
        const scalePixels = auToPixels(1);
        document.getElementById('scaleIndicator').textContent = `1 AU = ${scalePixels.toFixed(0)}px | Zoom: ${(state.zoom * 100).toFixed(0)}%`;

        requestAnimationFrame(render);
    }

    // ==================== INTERACTION ====================
    canvas.addEventListener('mousedown', (e) => {
        state.dragging = true;
        state.dragStartX = e.clientX;
        state.dragStartY = e.clientY;
        state.panStartX = state.panX;
        state.panStartY = state.panY;
    });

    canvas.addEventListener('mousemove', (e) => {
        if (state.dragging) {
            state.panX = state.panStartX + (e.clientX - state.dragStartX);
            state.panY = state.panStartY + (e.clientY - state.dragStartY);
        }

        // Hit detection
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        let found = null;
        PLANETS.forEach(planet => {
            if (planet._screenX !== undefined) {
                const dx = mx - planet._screenX;
                const dy = my - planet._screenY;
                const hitR = Math.max(planet._screenR + 8, 15);
                if (dx * dx + dy * dy < hitR * hitR) {
                    found = planet;
                }
            }
        });

        // Check sun hit
        const center = getCanvasCenter();
        const sdx = mx - center.x;
        const sdy = my - center.y;
        const sunR = Math.max(8, 22 * state.zoom);
        if (sdx * sdx + sdy * sdy < (sunR + 10) * (sunR + 10)) {
            found = 'sun';
        }

        state.hoveredPlanet = found ? (found === 'sun' ? null : found.id) : null;
        canvas.style.cursor = found ? 'pointer' : (state.dragging ? 'grabbing' : 'grab');

        // Tooltip
        const tooltip = document.getElementById('tooltip');
        if (found && found !== 'sun') {
            tooltip.classList.remove('hidden');
            tooltip.innerHTML = `<span style="color:${found.color}; font-weight:600;">${found.name}</span> <span style="color:#6a7fa0;">(${found.nameEn})</span>`;
            tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
            tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
        } else if (found === 'sun') {
            tooltip.classList.remove('hidden');
            tooltip.innerHTML = `<span style="color:#ffcc00; font-weight:600;">☀ Mặt Trời</span>`;
            tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
            tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
        } else {
            tooltip.classList.add('hidden');
        }
    });

    canvas.addEventListener('mouseup', (e) => {
        const wasDrag = Math.abs(e.clientX - state.dragStartX) > 5 || Math.abs(e.clientY - state.dragStartY) > 5;
        state.dragging = false;

        if (!wasDrag) {
            // Click - select planet
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            let found = null;
            PLANETS.forEach(planet => {
                if (planet._screenX !== undefined) {
                    const dx = mx - planet._screenX;
                    const dy = my - planet._screenY;
                    const hitR = Math.max(planet._screenR + 8, 15);
                    if (dx * dx + dy * dy < hitR * hitR) {
                        found = planet;
                    }
                }
            });

            const center = getCanvasCenter();
            const sdx = mx - center.x;
            const sdy = my - center.y;
            const sunR = Math.max(8, 22 * state.zoom);
            if (sdx * sdx + sdy * sdy < (sunR + 10) * (sunR + 10)) {
                selectPlanet('sun');
                return;
            }

            if (found) {
                selectPlanet(found.id);
            }
        }
    });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        state.zoom = Math.max(0.1, Math.min(5, state.zoom * delta));
        document.getElementById('zoomSlider').value = state.zoom * 100;
        state.trails = {};
    }, { passive: false });

    // ==================== CONTROLS ====================
    function togglePause() {
        state.paused = !state.paused;
        document.getElementById('btnPlayPause').textContent = state.paused ? '▶' : '⏸';
    }

    function stepForward() {
        state.time += 1;
    }

    function updateSpeed() {
        const val = document.getElementById('speedSlider').value;
        // Exponential mapping: 0-500 -> 0.1 - 100
        state.speed = Math.pow(10, (val - 50) / 100);
        document.getElementById('speedLabel').textContent = state.speed < 10 ? state.speed.toFixed(1) + 'x' : state.speed.toFixed(0) + 'x';
    }

    function updateZoomFromSlider() {
        state.zoom = document.getElementById('zoomSlider').value / 100;
        state.trails = {};
    }

    function zoomIn() {
        state.zoom = Math.min(5, state.zoom * 1.2);
        document.getElementById('zoomSlider').value = state.zoom * 100;
        state.trails = {};
    }

    function zoomOut() {
        state.zoom = Math.max(0.1, state.zoom / 1.2);
        document.getElementById('zoomSlider').value = state.zoom * 100;
        state.trails = {};
    }

    function resetView() {
        state.zoom = 1.0;
        state.panX = 0;
        state.panY = 0;
        document.getElementById('zoomSlider').value = 100;
        state.trails = {};
    }

    function setViewMode(mode) {
        state.viewMode = mode;
        state.trails = {};
        document.getElementById('btnRealistic').classList.toggle('active', mode === 'realistic');
        document.getElementById('btnSchematic').classList.toggle('active', mode === 'schematic');
    }

    document.getElementById('showOrbits').addEventListener('change', (e) => { state.showOrbits = e.target.checked; });
    document.getElementById('showLabels').addEventListener('change', (e) => { state.showLabels = e.target.checked; });
    document.getElementById('showTrails').addEventListener('change', (e) => {
        state.showTrails = e.target.checked;
        if (!e.target.checked) state.trails = {};
    });

    // ==================== PLANET LIST & INFO ====================
    function renderPlanetList() {
        const container = document.getElementById('planetList');
        const search = document.getElementById('searchInput').value.toLowerCase();

        // Sun item
        if ('mặt trời sun'.includes(search)) {
            const sunEl = document.createElement('div');
            sunEl.className = `planet-list-item rounded-lg p-3 flex items-center gap-3 ${state.selectedPlanet === 'sun' ? 'selected' : ''}`;
            sunEl.onclick = () => selectPlanet('sun');
            sunEl.innerHTML = `
                <div class="w-8 h-8 rounded-full flex-shrink-0" style="background: radial-gradient(circle at 35% 35%, #fffff0, #ffcc00, #ff9900);"></div>
                <div class="flex-1 min-w-0">
                    <div class="text-sm font-medium">Mặt Trời</div>
                    <div class="text-[10px] text-blue-200/30">Sun • Ngôi sao</div>
                </div>
            `;
            container.appendChild(sunEl);
        }

        PLANETS.forEach(planet => {
            if (!planet.name.toLowerCase().includes(search) && !planet.nameEn.toLowerCase().includes(search)) return;

            const el = document.createElement('div');
            el.className = `planet-list-item rounded-lg p-3 flex items-center gap-3 ${state.selectedPlanet === planet.id ? 'selected' : ''}`;
            el.onclick = () => selectPlanet(planet.id);
            el.onmouseenter = () => { state.hoveredPlanet = planet.id; };
            el.onmouseleave = () => { state.hoveredPlanet = null; };
            el.innerHTML = `
                <div class="w-8 h-8 rounded-full flex-shrink-0" style="background: radial-gradient(circle at 35% 35%, ${planet.colorGradient[0]}, ${planet.colorGradient[1]});"></div>
                <div class="flex-1 min-w-0">
                    <div class="text-sm font-medium">${planet.name}</div>
                    <div class="text-[10px] text-blue-200/30">${planet.nameEn} • ${planet.distFromSun}</div>
                </div>
                <div class="w-2 h-2 rounded-full flex-shrink-0" style="background:${planet.color}; opacity:0.5;"></div>
            `;
            container.appendChild(el);
        });
    }

    function selectPlanet(id) {
        state.selectedPlanet = id;
        document.getElementById('planetList').innerHTML = '';
        renderPlanetList();
        updateInfoPanel(id);

        // Focus on planet
        if (id !== 'sun') {
            const planet = PLANETS.find(p => p.id === id);
            if (planet) {
                const pos = getPlanetPosition(planet, state.time);
                const targetPx = auToPixels(pos.x);
                const targetPy = auToPixels(pos.y);
                // Don't auto-pan, just highlight
            }
        }
    }

    }

    function makeDataRow(label, value) {
        return `<div class="data-row">
            <span class="stat-label">${label}</span>
            <span class="stat-value">${value}</span>
        </div>`;
    }

    function makeBar(label, percent, color) {
        return `<div>
            <div class="flex justify-between text-[11px] mb-1">
                <span class="text-blue-200/50">${label}</span>
                <span class="text-blue-200/70 font-mono">${percent}%</span>
            </div>
            <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
                <div class="h-full rounded-full" style="width:${percent}%; background:${color};"></div>
            </div>
        </div>`;
    }

    function formatPeriod(days) {
        if (days < 365.25) return days.toFixed(1) + ' ngày';
        const years = days / 365.25;
        return years.toFixed(2) + ' năm (' + days.toFixed(0) + ' ngày)';
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', () => {
        document.getElementById('planetList').innerHTML = '';
        renderPlanetList();
    });

    // ==================== KEYBOARD ====================
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); togglePause(); }
        if (e.code === 'Equal' || e.code === 'NumpadAdd') zoomIn();
        if (e.code === 'Minus' || e.code === 'NumpadSubtract') zoomOut();
        if (e.code === 'KeyR') resetView();
        if (e.code === 'ArrowRight') { state.time += 10; }
        if (e.code === 'ArrowLeft') { state.time -= 10; }

        // Number keys to select planets
        const num = parseInt(e.key);
        if (num === 0) selectPlanet('sun');
        else if (num >= 1 && num <= 8) selectPlanet(PLANETS[num - 1].id);
    });

    // ==================== INIT ====================
    function init() {
        resizeCanvas();
        selectPlanet('sun');
        updateSpeed();

        // Auto-select Earth after a moment
        setTimeout(() => selectPlanet('earth'), 1000);

        requestAnimationFrame(render);
    }

    init();
    </script>
</body>
</html>
